<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HMS Staff — Setup</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; padding: 32px; background: #0f1420; color: #e8ecf4; margin: 0; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p { color: #93a0b8; font-size: 13px; margin-top: 0; }
  input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3350; background: #161c2c; color: #e8ecf4; font-size: 14px; box-sizing: border-box; }
  button { margin-top: 16px; width: 100%; padding: 10px; border-radius: 8px; border: none; background: #4f7cff; color: white; font-size: 14px; cursor: pointer; }
  button:hover { background: #3d68f0; }
  .error { color: #ff6b6b; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
  <h1>Connect to your hospital</h1>
  <p>Enter the web address your hospital gave you, e.g. https://stjohns.hms.example.com</p>
  <input id="url" type="text" placeholder="https://yourhospital.example.com" autofocus />
  <div class="error" id="error"></div>
  <button id="continue">Continue</button>
  <script src="setup.js"></script>
</body>
</html>
