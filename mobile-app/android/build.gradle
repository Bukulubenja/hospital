buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        // Do not downgrade this to work around the CMake gold-linker probe
        // issue below — react-android's prebuilt headers (graphicsConversions.h
        // uses std::format) require NDK 27's newer libc++; NDK 26 fails with
        // "no member named 'format' in namespace 'std'". The actual fix for
        // the gold-linker issue is app/build.gradle's cmake.version override.
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
