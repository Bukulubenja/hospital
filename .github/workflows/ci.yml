name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: HMS
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-ci-test-secret-key-0123456789-abcdefghijklmnopqrstuvwxyz-not-for-prod
      DEBUG: "False"
      # Wildcard needed so TenantTestCase's per-test subdomain Host headers
      # (test.<BASE_DOMAIN>, hospital-a.<BASE_DOMAIN>, ...) pass Django's
      # ALLOWED_HOSTS check — see hospital/tests.py and CLAUDE.md's
      # Multi-tenancy section.
      BASE_DOMAIN: ci.example.com
      ALLOWED_HOSTS: .ci.example.com,localhost,127.0.0.1
      DB_NAME: HMS
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      # Exercises the checklist as if all the production TLS flags were
      # switched on (see .env.example) — catches settings.py drift (e.g. a
      # new required setting) without forcing the test client below to
      # speak HTTPS.
      - name: Django deployment security checklist
        env:
          SECURE_SSL_REDIRECT: "True"
          SESSION_COOKIE_SECURE: "True"
          CSRF_COOKIE_SECURE: "True"
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
          SECURE_HSTS_PRELOAD: "True"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Run test suite
        run: python manage.py test hospital

  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt
