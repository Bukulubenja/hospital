
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Reception Dashboard</title>
	<style>
		:root{--accent:#0b78d1;--muted:#666}
		body{font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:0;background:#f5f7fb;color:#222}
		header{background:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e6e9ef}
		header h1{margin:0;font-size:18px}
		.container{display:flex;gap:20px;padding:20px;max-width:1200px;margin:0 auto}
		nav{width:220px;background:white;border:1px solid #e6e9ef;border-radius:8px;padding:12px}
		.main{flex:1;display:flex;flex-direction:column;gap:16px}
		.card{background:white;padding:12px;border:1px solid #e6e9ef;border-radius:8px}
		.search{display:flex;gap:8px}
		input[type=text]{flex:1;padding:8px;border:1px solid #d7dce6;border-radius:6px}
		button{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
		.list{max-height:360px;overflow:auto}
		table{width:100%;border-collapse:collapse}
		th,td{padding:8px 6px;text-align:left;border-bottom:1px solid #f0f2f5;font-size:14px}
		th{color:var(--muted);font-weight:600}
		.muted{color:var(--muted);font-size:13px}
		.actions{display:flex;gap:6px}
		.btn-ghost{background:transparent;color:var(--accent);border:1px solid #d7e9fb;padding:6px 8px;border-radius:6px}
		footer{padding:12px;text-align:center;color:var(--muted);font-size:13px}
		@media(max-width:880px){.container{flex-direction:column;padding:12px}nav{width:100%}}
	</style>
</head>
<body>
	<header>
		<h1>Reception — Dashboard</h1>
		<div style="display:flex;gap:12px;align-items:center">
			<div class="muted">Today: <strong id="today"></strong></div>
			<button onclick="newPatient()">New Patient</button>
		</div>
	</header>

	<div class="container">
		<nav class="card">
			<div style="margin-bottom:12px"><strong>Quick Actions</strong></div>
			<div style="display:flex;flex-direction:column;gap:8px">
				<button class="btn-ghost" onclick="focusSearch()">Search patient</button>
				<button class="btn-ghost" onclick="openCheckin()">Check-in</button>
				<button class="btn-ghost" onclick="openAppointment()">Schedule appt.</button>
				<button class="btn-ghost" onclick="openMessages()">Messages</button>
			</div>
			<hr style="margin:12px 0;border:none;border-top:1px solid #f0f2f5">
			<div><strong>Counters</strong></div>
			<div style="display:flex;gap:10px;margin-top:10px">
				<div style="flex:1;background:#f8fbff;padding:10px;border-radius:6px;text-align:center"><div class="muted">Waiting</div><div style="font-weight:700">6</div></div>
				<div style="flex:1;background:#fff7f0;padding:10px;border-radius:6px;text-align:center"><div class="muted">Today</div><div style="font-weight:700">14</div></div>
			</div>
		</nav>

		<main class="main">
			<div class="card">
				<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
					<strong>Appointments</strong>
					<div class="search">
						<input id="search" type="text" placeholder="Search by name or ID" oninput="filterPatients()">
						<button onclick="filterPatients()">Search</button>
					</div>
				</div>
				<div class="list">
					<table id="appt-table">
						<thead>
							<tr><th>Time</th><th>Patient</th><th>Service</th><th>Provider</th><th></th></tr>
						</thead>
						<tbody>
							<!-- rows populated by JS -->
						</tbody>
					</table>
				</div>
			</div>

			<div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
				<div class="card">
					<strong>Check-in Queue</strong>
					<div class="list" style="margin-top:10px">
						<table id="queue-table">
							<thead><tr><th>Room</th><th>Patient</th><th>ETA</th><th></th></tr></thead>
							<tbody></tbody>
						</table>
					</div>
				</div>

				<div class="card">
					<strong>Notifications</strong>
					<ul id="notes" style="margin:10px 0 0 0;padding-left:18px;color:var(--muted)"></ul>
				</div>
			</div>
		</main>
	</div>

	<footer>Reception Dashboard • Simple HMS</footer>

	<script>
		const todayEl = document.getElementById('today');
		todayEl.textContent = new Date().toLocaleDateString();

		const appts = [
			{time:'09:00', name:'John Doe', service:'Consultation', provider:'Dr. Smith'},
			{time:'09:30', name:'Mary Lee', service:'Follow-up', provider:'Dr. Patel'},
			{time:'10:00', name:'Sam Green', service:'X-Ray', provider:'Imaging'},
			{time:'10:30', name:'Anna Kim', service:'Vaccination', provider:'Nurse Joy'}
		];

		const queue = [
			{room:'1',name:'Eve Stone',eta:'5m'},
			{room:'2',name:'Liam Fox',eta:'10m'},
			{room:'3',name:'Olga Ray',eta:'15m'}
		];

		function renderTable(){
			const tb = document.querySelector('#appt-table tbody'); tb.innerHTML='';
			appts.forEach(a=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${a.time}</td><td>${a.name}</td><td>${a.service}</td><td>${a.provider}</td><td class="actions"><button class="btn-ghost" onclick="checkin('${a.name.replace(/'/g,"\\'")}')">Check-in</button></td>`;tb.appendChild(tr)});
			const tq = document.querySelector('#queue-table tbody'); tq.innerHTML='';
			queue.forEach(q=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${q.room}</td><td>${q.name}</td><td>${q.eta}</td><td><button class="btn-ghost" onclick="seat('${q.name.replace(/'/g,"\\'")}')">Seat</button></td>`;tq.appendChild(tr)});
			const notes = document.getElementById('notes'); notes.innerHTML=''; ['Lab results ready for Mary Lee','Insurance update needed: Sam Green'].forEach(n=>{const li=document.createElement('li');li.textContent=n;notes.appendChild(li)});
		}

		function filterPatients(){
			const q = document.getElementById('search').value.toLowerCase();
			const rows = document.querySelectorAll('#appt-table tbody tr');
			rows.forEach(r=>{const txt=r.textContent.toLowerCase();r.style.display = txt.includes(q)?'':'none'});
		}

		function focusSearch(){document.getElementById('search').focus();}
		function newPatient(){alert('Open new patient form (stub)')}
		function openCheckin(){alert('Open check-in panel (stub)')}
		function openAppointment(){alert('Open schedule appointment (stub)')}
		function openMessages(){alert('Open messages (stub)')}
		function checkin(name){alert('Checking in: '+name)}
		function seat(name){alert('Seating: '+name)}

		renderTable();
	</script>
</body>
</html>
