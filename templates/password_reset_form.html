{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password - Hospital Management System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<script src="https://unpkg.com/lucide@0.462.0" defer></script>
</head>
<body>

<div class="background"></div>

<section class="login-container" style="grid-template-columns: 1fr;">
    <div class="login-panel">
        <div class="glass">
            <div class="panel-header">
                <h2>Reset Password</h2>
                <p>Enter your account's email and we'll send you a link to reset your password.</p>
            </div>

            {% if form.errors %}
                <div aria-live="polite">
                    {% for error in form.email.errors %}
                        <div class="alert-message error" role="alert">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" novalidate>
                {% csrf_token %}
                <div class="input-group">
                    <i data-lucide="mail" aria-hidden="true"></i>
                    <label for="id_email" class="sr-only">Email</label>
                    <input
                        id="id_email"
                        type="email"
                        name="email"
                        placeholder="Email address"
                        autocomplete="email"
                        autofocus
                        required
                    >
                </div>

                <button type="submit" class="login-btn">Send Reset Link</button>
            </form>

            <div class="options" style="justify-content: center;">
                <a href="{% url 'login' %}">Back to log in</a>
            </div>
        </div>
    </div>
</section>
<script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
