{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Password Changed - Hospital Management System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<script src="https://unpkg.com/lucide@0.462.0" defer></script>
</head>
<body>

<div class="background"></div>

<section class="login-container" style="grid-template-columns: 1fr;">
    <div class="login-panel">
        <div class="glass">
            <div class="panel-header">
                <h2>Password Changed</h2>
                <p>Your password has been set. You can now log in with your new password.</p>
            </div>

            <a href="{% url 'login' %}" class="login-btn" style="display: block; text-align: center; text-decoration: none; line-height: 65px;">Log In</a>
        </div>
    </div>
</section>
<script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });</script>
</body>
</html>
